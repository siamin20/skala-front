<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="브라우저에 저장된 계정으로 로그인 — SKALA 신민서 데모." />
  <meta name="author" content="신민서" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#4338ca" />
  <title>로그인 · SKALA.신민서</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234338ca'/%3E%3Ctext x='16' y='22' font-family='monospace' font-size='16' font-weight='700' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />

  <script>
    (function () {
      try {
        var t = localStorage.getItem("skala-theme");
        if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>

<body class="page">
  <a class="skip-link" href="#main">본문으로 건너뛰기</a>

  <header class="site-header">
    <div class="container">
      <a class="brand" href="../index.html" aria-label="SKALA 신민서 홈">
        <span class="brand__logo" aria-hidden="true"><img src="../media/skala-logo.png" alt="" /></span>
        <span><span class="brand__dot">.</span>신민서</span>
      </a>
      <nav class="nav" data-nav aria-label="주요 메뉴">
        <ul class="nav__list">
          <li><a class="nav__link" href="myProfile.html"><span class="idx">01</span> 소개</a></li>
          <li><a class="nav__link" href="myClass.html"><span class="idx">02</span> 일정</a></li>
          <li><a class="nav__link" href="myHoliday.html"><span class="idx">03</span> 휴일</a></li>
          <li><a class="nav__link" href="myTrip.html"><span class="idx">04</span> 여행</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <span class="auth-user" data-auth-user hidden></span>
        <a class="btn btn--ghost btn--sm" href="myPage.html" data-mypage-link>마이페이지</a>
        <button class="btn btn--sm" type="button" data-auth-btn>로그인</button>
        <button class="icon-btn" type="button" data-theme-toggle aria-pressed="false" aria-label="다크 모드로 전환" title="다크 모드">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button class="nav-toggle" type="button" data-nav-toggle aria-expanded="false" aria-label="메뉴 열기">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main">
    <div class="container narrow">

      <section class="page-hero" aria-labelledby="l-title">
        <p class="eyebrow">// Login</p>
        <h1 id="l-title">로그인</h1>
        <p class="section-lead">회원가입 때 만든 계정으로 로그인해요. <small class="text-muted">(브라우저에만 저장되는 데모 로그인이에요.)</small></p>
      </section>

      <section class="section" aria-labelledby="login-title">
        <h2 id="login-title" class="sr-only">로그인 폼</h2>
        <div class="card auth-card">
          <form data-login-form autocomplete="on" novalidate>
            <div class="field">
              <label for="loginId">아이디</label>
              <input class="input" type="text" id="loginId" name="loginId" placeholder="아이디" required autocomplete="username" />
            </div>
            <div class="field">
              <label for="loginPw">비밀번호</label>
              <div class="input-wrap">
                <input class="input" type="password" id="loginPw" name="loginPw" placeholder="비밀번호" required autocomplete="current-password" />
                <button type="button" class="pw-toggle" data-pw-toggle="loginPw" aria-label="비밀번호 표시" aria-pressed="false">
                  <svg class="eye-on" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-off" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 12s3.5-7 10-7c2 0 3.8.6 5.3 1.5M22 12s-3.5 7-10 7c-2 0-3.8-.6-5.3-1.5"/><path d="M4 4l16 16"/></svg>
                </button>
              </div>
            </div>
            <label class="check-line"><input type="checkbox" id="rememberId" /> 아이디 저장</label>
            <p class="field-status" data-login-error data-state="bad" role="alert" aria-live="assertive"></p>
            <div class="form-actions">
              <button class="btn btn--block" type="submit">로그인</button>
            </div>
          </form>

          <hr class="divider" />
          <p class="auth-alt">아직 계정이 없으신가요?</p>
          <a class="btn btn--ghost btn--block" href="signUp.html">회원가입</a>
        </div>
      </section>

    </div>
  </main>

  <button class="to-top" type="button" data-to-top aria-label="맨 위로 이동">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <script src="../script/theme.js"></script>
  <script src="../script/app.js"></script>
  <script src="../script/auth.js"></script>
  <script>
    (function () {
      var form = document.querySelector("[data-login-form]");
      var id = document.getElementById("loginId");
      var pw = document.getElementById("loginPw");
      var remember = document.getElementById("rememberId");
      var errEl = document.querySelector("[data-login-error]");

      // 비밀번호 보기 토글
      var tog = document.querySelector("[data-pw-toggle]");
      if (tog) tog.addEventListener("click", function () {
        var show = pw.type === "password";
        pw.type = show ? "text" : "password";
        tog.setAttribute("aria-pressed", String(show));
        tog.classList.toggle("is-on", show);
      });

      // 아이디 저장 프리필
      var saved = SkalaAuth.getRememberedId();
      if (saved) { id.value = saved; remember.checked = true; }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        errEl.textContent = "";
        var uid = id.value.trim();
        if (!uid || !pw.value) { errEl.textContent = "아이디와 비밀번호를 입력하세요."; return; }
        var btn = form.querySelector('[type="submit"]');
        btn.disabled = true;
        SkalaAuth.login(uid, pw.value).then(function (res) {
          btn.disabled = false;
          if (res.ok) {
            SkalaAuth.rememberId(remember.checked ? uid : null);
            location.href = SkalaAuth.paths.mypage;
          } else if (res.reason === "noid") {
            errEl.textContent = "가입된 아이디가 아니에요. 먼저 회원가입 해주세요.";
          } else {
            errEl.textContent = "비밀번호가 올바르지 않아요.";
          }
        });
      });
    })();
  </script>
</body>
</html>
