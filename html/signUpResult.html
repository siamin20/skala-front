  <!-- GET 쿼리스트링을 파싱해 결과 렌더 -->
  <script>
    (function () {
      var box = document.getElementById("result");
      if (!box) return;

      var params = new URLSearchParams(location.search);

      // 필드 키 → 한글 라벨 (표시 순서 = 정의 순서)
      var labels = {
        userId: "아이디", userEmail: "이메일", emailDomain: "이메일 도메인",
        userName: "이름", userBirth: "생년월일", userTel: "전화번호", job: "희망 직군",
        gender: "성별", interest: "관심 분야", exp: "개발 경력", themeColor: "프로필 색상",
        avatar: "프로필 이미지", intro: "자기소개",
        agreeTos: "이용약관 동의", agreePrivacy: "개인정보 수집·이용 동의"
      };
      var expLabel = function (v) { v = +v; return v === 0 ? "신입" : v >= 10 ? "10년 이상" : v + "년"; };
      // 가입 시 저장된 프로필(아바타 등)을 auth 저장소에서 읽어 보강
      var stored = (window.SkalaAuth && params.get("userId")) ? SkalaAuth.getUser(params.get("userId")) : null;
      var hasAvatar = !!(stored && stored.avatar);
      var EMPTY = "미입력";

      // 직접 방문(쿼리 없음) 처리
      if ([...params.keys()].length === 0) {
        box.innerHTML =
          '<p class="text-muted">제출된 데이터가 없어요. 먼저 <a href="signUp.html">회원가입 폼</a>을 작성해 주세요.</p>';
        return;
      }

      var esc = function (s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      };

      var dl = document.createElement("dl");

      Object.keys(labels).forEach(function (key) {
        if (!params.has(key)) return;

        var values = params.getAll(key); // 체크박스 등 다중 값 대응
        var display;

        if (key === "userEmail") {
          var domain = params.get("emailDomain");
          display = values[0] ? (esc(values[0]) + (domain ? "@" + esc(domain) : "")) : EMPTY;
        } else if (key === "emailDomain") {
          return; // 이메일에 합쳐서 표시했으므로 건너뜀
        } else if (key === "exp") {
          display = expLabel(values[0]);
        } else if (key === "agreeTos" || key === "agreePrivacy") {
          display = "동의함 ✓";
        } else if (key === "themeColor") {
          if (hasAvatar) return; // 프로필 이미지를 넣었으면 색상은 생략
          display = '<span style="display:inline-block;width:1.05em;height:1.05em;border-radius:4px;vertical-align:-2px;border:1px solid var(--border);background:' + esc(values[0]) + '"></span>';
        } else if (key === "avatar") {
          // 파일명 대신 실제 저장된 썸네일 이미지를 표시
          display = hasAvatar
            ? '<img src="' + stored.avatar + '" alt="프로필 이미지" style="width:56px;height:56px;border-radius:var(--radius-sm);object-fit:cover;border:1px solid var(--border);vertical-align:middle">'
            : EMPTY;
        } else {
          display = values.map(esc).join(", ") || EMPTY;
        }

        var dt = document.createElement("dt");
        dt.textContent = labels[key];
        var dd = document.createElement("dd");
        dd.innerHTML = display;
        dl.appendChild(dt);
        dl.appendChild(dd);
      });

      box.innerHTML = '<p class="badge badge--live"><span class="dot" aria-hidden="true"></span> 가입 완료</p>';
      box.appendChild(dl);

      // 가입 완료 축하 컨페티 (reduced-motion이면 생략)
      celebrate();

      function celebrate() {
        if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
        var c = document.createElement("canvas");
        c.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9999";
        document.body.appendChild(c);
        var ctx = c.getContext("2d"), W, H;
        function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
        resize();
        window.addEventListener("resize", resize);
        var colors = ["#4338ca", "#0d9488", "#7c3aed", "#f59e0b", "#e11d48", "#0284c7"];
        var parts = [];
        for (var i = 0; i < 150; i++) {
          parts.push({
            x: Math.random() * W, y: -20 - Math.random() * H * 0.4,
            r: 5 + Math.random() * 7, c: colors[i % colors.length],
            vx: (Math.random() - 0.5) * 3, vy: 2 + Math.random() * 3.5,
            rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 0.3
          });
        }
        var start = null, DUR = 2800;
        function frame(t) {
          if (start === null) start = t;
          ctx.clearRect(0, 0, W, H);
          parts.forEach(function (p) {
            p.x += p.vx; p.y += p.vy; p.vy += 0.045; p.rot += p.vr;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
            ctx.fillStyle = p.c; ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
            ctx.restore();
          });
          if (t - start < DUR) requestAnimationFrame(frame);
          else { window.removeEventListener("resize", resize); c.remove(); }
        }
        requestAnimationFrame(frame);
      }
    })();
  </script>
